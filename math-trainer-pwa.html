<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Math Trainer" />
    <meta name="theme-color" content="#0a0c10" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <title>Math Trainer</title>
    <style>
      :root {
        --bg: #0a0c10;
        --bg2: #111318;
        --bg3: #1a1d24;
        --acc: #00e676;
        --err: #ff1744;
        --warn: #ffab00;
        --dim: #3a3f4b;
        --muted: #6b7280;
        --text: #e8eaf0;
        --font: "JetBrains Mono", "Segoe UI", monospace;
        --r: 6px;
        --r2: 10px;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        background: var(--bg);
        -webkit-text-size-adjust: 100%;
        height: -webkit-fill-available;
      }
      body {
        width: 100%;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        display: flex;
        flex-direction: column;
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
      }

      /* ── HUD ── */
      #hud {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, auto) minmax(0, auto);
        align-items: center;
        gap: 8px;
        background: var(--bg2);
        border-bottom: 1px solid var(--dim);
        padding: 0 12px;
        height: 52px;
        flex-shrink: 0;
      }
      #elapsed {
        font-size: clamp(14px, 4vw, 18px);
        font-weight: 700;
        color: var(--muted);
        letter-spacing: 0.04em;
        font-variant-numeric: tabular-nums;
      }
      .hud-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        color: var(--muted);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: var(--r);
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        width: 44px;
        height: 44px;
      }
      #g-wrap {
        position: relative;
        display: flex;
      }

      /* ── ARENA ── */
      #arena {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px 20px;
        gap: clamp(14px, 4vw, 28px);
      }
      #prob {
        display: flex;
        align-items: center;
        gap: clamp(14px, 4vw, 32px);
      }
      .op-n {
        font-size: clamp(56px, 16vw, 88px);
        font-weight: 700;
        color: var(--text);
        line-height: 1;
      }
      .op-sym {
        font-size: clamp(56px, 16vw, 88px);
        font-weight: 300;
        color: var(--dim);
        line-height: 1;
        user-select: none;
      }
      #fb {
        height: 22px;
        font-size: clamp(12px, 3.5vw, 15px);
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        letter-spacing: 0.04em;
      }
      #ans {
        font-family: var(--font);
        font-weight: 700;
        font-size: 28px;
        color: var(--acc);
        background: var(--bg3);
        border: 2px solid var(--dim);
        border-radius: var(--r2);
        padding: 12px 20px;
        width: clamp(160px, 44vw, 260px);
        text-align: center;
        outline: none;
        caret-color: var(--acc);
        transition: border-color 0.15s;
        -webkit-appearance: none;
        -moz-appearance: textfield;
        touch-action: manipulation;
      }
      #ans::-webkit-outer-spin-button,
      #ans::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      #ans:focus {
        border-color: var(--acc);
      }
      #ans.shake {
        animation: shake 0.42s ease;
        border-color: var(--err);
      }
      #skip-btn {
        font-family: var(--font);
        font-size: clamp(11px, 3vw, 13px);
        font-weight: 700;
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--dim);
        border-radius: var(--r2);
        padding: 0 16px;
        height: 54px;
        cursor: pointer;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        white-space: nowrap;
        transition:
          color 0.15s,
          border-color 0.15s;
      }
      #skip-btn:active {
        color: var(--err);
        border-color: var(--err);
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        14% {
          transform: translateX(-9px);
        }
        28% {
          transform: translateX(9px);
        }
        42% {
          transform: translateX(-6px);
        }
        57% {
          transform: translateX(6px);
        }
        71% {
          transform: translateX(-3px);
        }
        85% {
          transform: translateX(3px);
        }
      }

      /* ── RESULTS OVERLAY ── */
      #results-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(10, 12, 16, 0.93);
        z-index: 20;
        align-items: center;
        justify-content: center;
        padding: 20px;
        -webkit-backdrop-filter: blur(6px);
        backdrop-filter: blur(6px);
      }
      #results-overlay.open {
        display: flex;
      }
      #results-card {
        background: var(--bg2);
        border: 1px solid var(--dim);
        border-radius: 14px;
        padding: clamp(20px, 5vw, 32px) clamp(20px, 5vw, 40px);
        display: flex;
        flex-direction: column;
        gap: clamp(14px, 3vw, 22px);
        width: 100%;
        max-width: 440px;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.7);
      }
      #results-header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, auto);
        align-items: center;
      }
      #results-title {
        font-size: clamp(12px, 3.5vw, 15px);
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      #results-time {
        font-size: clamp(12px, 3.5vw, 15px);
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      #results-big {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: clamp(8px, 2vw, 14px);
      }
      .rb {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        background: var(--bg3);
        border-radius: var(--r2);
        padding: clamp(10px, 2.5vw, 16px) 6px;
      }
      .rb-v {
        font-size: clamp(24px, 7vw, 36px);
        font-weight: 700;
        line-height: 1;
      }
      .rb-k {
        font-size: clamp(8px, 2vw, 10px);
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        text-align: center;
      }
      .rb-score .rb-v {
        color: var(--acc);
      }
      .rb-wrong .rb-v {
        color: var(--err);
      }
      .rb-streak .rb-v {
        color: var(--warn);
      }
      #results-bars {
        display: flex;
        flex-direction: column;
        gap: clamp(6px, 1.5vw, 10px);
      }
      .bar-row {
        display: grid;
        grid-template-columns: minmax(0, 28px) minmax(0, 1fr) minmax(0, auto);
        align-items: center;
        gap: clamp(8px, 2vw, 14px);
      }
      .bar-lbl {
        font-size: clamp(11px, 3vw, 13px);
        color: var(--muted);
        text-align: center;
        font-weight: 700;
      }
      .bar-track {
        height: 7px;
        background: var(--bg3);
        border-radius: 99px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        border-radius: 99px;
      }
      .bar-stat {
        font-size: clamp(10px, 2.5vw, 12px);
        color: var(--muted);
        white-space: nowrap;
        text-align: right;
        min-width: 80px;
      }
      #results-actions {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 10px;
      }
      .ra-btn {
        font-family: var(--font);
        font-size: clamp(12px, 3vw, 14px);
        font-weight: 700;
        border-radius: var(--r);
        padding: 14px 10px;
        cursor: pointer;
        border: none;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      #btn-restart {
        background: var(--acc);
        color: var(--bg);
      }
      #btn-close {
        background: var(--bg3);
        color: var(--muted);
        border: 1px solid var(--dim);
      }

      /* ── SETTINGS ── */
      #settings {
        display: none;
        position: absolute;
        top: 100%;
        right: 0;
        margin-top: 6px;
        background: var(--bg2);
        border: 1px solid var(--dim);
        border-radius: var(--r2);
        padding: 16px;
        width: clamp(190px, 55vw, 240px);
        z-index: 30;
        flex-direction: column;
        gap: 14px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
      }
      #settings.open {
        display: flex;
      }
      .s-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .s-lbl {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .ops-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }
      .op-tog {
        font-family: var(--font);
        font-size: 18px;
        font-weight: 700;
        background: var(--bg3);
        border: 2px solid var(--dim);
        border-radius: var(--r);
        color: var(--muted);
        cursor: pointer;
        padding: 8px 4px;
        text-align: center;
        -webkit-appearance: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        min-height: 44px;
      }
      .op-tog.on {
        border-color: var(--acc);
        color: var(--acc);
      }
      .range-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 8px;
      }
      .r-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .r-field span {
        font-size: 9px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .r-field input {
        font-family: var(--font);
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
        background: var(--bg3);
        border: 1px solid var(--dim);
        border-radius: var(--r);
        padding: 8px 10px;
        outline: none;
        width: 100%;
        -webkit-appearance: none;
        -moz-appearance: textfield;
        min-height: 44px;
      }
      .r-field input::-webkit-outer-spin-button,
      .r-field input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .r-field input:focus {
        border-color: var(--acc);
      }

      /* ── INSTALL BANNER ── */
      #install-banner {
        display: none;
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
        left: 50%;
        transform: translateX(-50%);
        background: var(--bg2);
        border: 1px solid var(--acc);
        border-radius: 12px;
        padding: 12px 16px;
        z-index: 40;
        gap: 12px;
        align-items: center;
        max-width: calc(100vw - 32px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      }
      #install-banner.show {
        display: flex;
      }
      #install-banner p {
        font-size: 12px;
        color: var(--text);
        line-height: 1.4;
        flex: 1;
      }
      #install-banner p span {
        color: var(--acc);
        font-weight: 700;
      }
      #banner-close {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        padding: 4px;
        font-size: 18px;
        line-height: 1;
        -webkit-tap-highlight-color: transparent;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <span id="elapsed">0:00</span>
      <button id="end-btn" class="hud-btn" aria-label="End session">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
          <rect
            x="2"
            y="2"
            width="5"
            height="12"
            rx="1.5"
            fill="currentColor"
          />
          <rect
            x="9"
            y="2"
            width="5"
            height="12"
            rx="1.5"
            fill="currentColor"
          />
        </svg>
      </button>
      <div id="g-wrap">
        <button id="g-btn" class="hud-btn" aria-label="Settings">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
            />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
        <div id="settings">
          <div class="s-group">
            <div class="s-lbl">Operations</div>
            <div class="ops-grid">
              <button class="op-tog on" data-op="+">+</button>
              <button class="op-tog on" data-op="−">−</button>
              <button class="op-tog on" data-op="×">×</button>
              <button class="op-tog on" data-op="÷">÷</button>
            </div>
          </div>
          <div class="s-group">
            <div class="s-lbl">Number Range</div>
            <div class="range-grid">
              <div class="r-field">
                <span>Min</span>
                <input
                  type="number"
                  id="rng-min"
                  value="1"
                  min="0"
                  max="999"
                  autocomplete="off"
                  inputmode="numeric"
                />
              </div>
              <div class="r-field">
                <span>Max</span>
                <input
                  type="number"
                  id="rng-max"
                  value="12"
                  min="1"
                  max="999"
                  autocomplete="off"
                  inputmode="numeric"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="arena">
      <div id="prob">
        <span class="op-n" id="p-a">—</span>
        <span class="op-sym" id="p-op">+</span>
        <span class="op-n" id="p-b">—</span>
      </div>
      <div id="fb"></div>
      <div id="input-row">
        <input
          id="ans"
          type="number"
          inputmode="decimal"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          placeholder=""
        />
        <button id="skip-btn">Skip</button>
      </div>
    </div>

    <div id="results-overlay">
      <div id="results-card">
        <div id="results-header">
          <span id="results-title">Session</span>
          <span id="results-time">0:00</span>
        </div>
        <div id="results-big">
          <div class="rb rb-score">
            <span class="rb-v" id="r-score">0</span>
            <span class="rb-k">Correct</span>
          </div>
          <div class="rb rb-wrong">
            <span class="rb-v" id="r-wrong">0</span>
            <span class="rb-k">Wrong</span>
          </div>
          <div class="rb rb-streak">
            <span class="rb-v" id="r-streak">0</span
            ><span class="rb-k">Best streak</span>
          </div>
        </div>
        <div id="results-bars"></div>
        <div id="results-actions">
          <button class="ra-btn" id="btn-restart">New session</button>
          <button class="ra-btn" id="btn-close">Resume</button>
        </div>
      </div>
    </div>

    <div id="install-banner">
      <p>
        Add to Home Screen for offline use:<br /><span
          >Share → Add to Home Screen</span
        >
      </p>
      <button id="banner-close">✕</button>
    </div>

    <script>
      const G = {
        score: 0,
        wrong: 0,
        streak: 0,
        bestStreak: 0,
        start: Date.now(),
        timerTick: null,
        a: 0,
        b: 0,
        op: "+",
        ans: 0,
        ops: new Set(["+", "−", "×", "÷"]),
        min: 1,
        max: 12,
        stats: {
          "+": { c: 0, t: 0 },
          "−": { c: 0, t: 0 },
          "×": { c: 0, t: 0 },
          "÷": { c: 0, t: 0 },
        },
        locked: false,
        fbTimer: null,
        elapsed: 0,
      };

      const $ = (id) => document.getElementById(id);
      const el = (tag, cls) => {
        const e = document.createElement(tag);
        if (cls) e.className = cls;
        return e;
      };
      const rnd = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
      const fmtTime = (s) =>
        `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;

      function nextQ() {
        const ops = [...G.ops];
        G.op = ops[rnd(0, ops.length - 1)];
        const mn = G.min,
          mx = G.max;
        if (G.op === "+") {
          G.a = rnd(mn, mx);
          G.b = rnd(mn, mx);
          G.ans = G.a + G.b;
        } else if (G.op === "−") {
          G.a = rnd(mn, mx);
          G.b = rnd(mn, G.a);
          G.ans = G.a - G.b;
        } else if (G.op === "×") {
          G.a = rnd(mn, mx);
          G.b = rnd(mn, mx);
          G.ans = G.a * G.b;
        } else {
          G.b = rnd(Math.max(1, mn), mx);
          G.ans = rnd(mn, mx);
          G.a = G.b * G.ans;
        }
        $("p-a").textContent = G.a;
        $("p-op").textContent = G.op;
        $("p-b").textContent = G.b;
        $("ans").value = "";
        $("ans").style.borderColor = "";
        G.locked = false;
      }

      function flash(msg, color) {
        const fb = $("fb");
        fb.textContent = msg;
        fb.style.color = color;
        if (G.fbTimer) clearTimeout(G.fbTimer);
        G.fbTimer = setTimeout(() => {
          fb.textContent = "";
          fb.style.color = "";
        }, 700);
      }

      function onInput() {
        if (G.locked) return;
        const raw = $("ans").value.trim();
        const v = parseInt(raw, 10);
        if (raw === "" || isNaN(v)) return;
        if (v === G.ans) {
          G.score++;
          G.streak++;
          if (G.streak > G.bestStreak) G.bestStreak = G.streak;
          G.stats[G.op].c++;
          G.stats[G.op].t++;
          flash("", "var(--acc)");
          nextQ();
        }
      }

      function skipQuestion() {
        if (G.locked) return;
        G.locked = true;
        G.wrong++;
        G.streak = 0;
        G.stats[G.op].t++;
        flash(`= ${G.ans}`, "var(--err)");
        const inp = $("ans");
        inp.classList.remove("shake");
        void inp.offsetWidth;
        inp.classList.add("shake");
        setTimeout(() => {
          inp.classList.remove("shake");
          inp.style.borderColor = "";
          nextQ();
        }, 700);
      }

      function tickTimer() {
        G.elapsed = Math.floor((Date.now() - G.start) / 1000);
        $("elapsed").textContent = fmtTime(G.elapsed);
      }

      function buildResultBars() {
        const c = $("results-bars");
        c.innerHTML = "";
        [...G.ops].forEach((op) => {
          const s = G.stats[op];
          const pct = s.t ? Math.round((s.c / s.t) * 100) : 0;
          const color =
            pct >= 90 ? "var(--acc)" : pct >= 70 ? "var(--warn)" : "var(--err)";
          const row = el("div", "bar-row");
          const lbl = el("div", "bar-lbl");
          lbl.textContent = op;
          const track = el("div", "bar-track");
          const fill = el("div", "bar-fill");
          fill.style.width = (s.t ? pct : 0) + "%";
          fill.style.backgroundColor = s.t ? color : "var(--dim)";
          track.appendChild(fill);
          const stat = el("div", "bar-stat");
          stat.textContent = s.t ? `${s.c}/${s.t} · ${pct}%` : "—";
          row.appendChild(lbl);
          row.appendChild(track);
          row.appendChild(stat);
          c.appendChild(row);
        });
      }

      function openResults() {
        clearInterval(G.timerTick);
        $("r-score").textContent = G.score;
        $("r-wrong").textContent = G.wrong;
        $("r-streak").textContent = G.bestStreak;
        $("results-time").textContent = fmtTime(G.elapsed);
        buildResultBars();
        $("results-overlay").classList.add("open");
      }

      function resumeSession() {
        $("results-overlay").classList.remove("open");
        G.start = Date.now() - G.elapsed * 1000;
        clearInterval(G.timerTick);
        G.timerTick = setInterval(tickTimer, 500);
      }

      function resetSession() {
        G.score = 0;
        G.wrong = 0;
        G.streak = 0;
        G.bestStreak = 0;
        G.start = Date.now();
        G.elapsed = 0;
        G.stats = {
          "+": { c: 0, t: 0 },
          "−": { c: 0, t: 0 },
          "×": { c: 0, t: 0 },
          "÷": { c: 0, t: 0 },
        };
        $("elapsed").textContent = "0:00";
        clearInterval(G.timerTick);
        G.timerTick = setInterval(tickTimer, 500);
        $("results-overlay").classList.remove("open");
        nextQ();
      }

      $("end-btn").addEventListener("click", (e) => {
        e.stopPropagation();
        openResults();
      });
      $("btn-restart").addEventListener("click", () => resetSession());
      $("btn-close").addEventListener("click", () => resumeSession());
      $("skip-btn").addEventListener("click", (e) => {
        e.preventDefault();
        skipQuestion();
      });
      $("ans").addEventListener("input", onInput);

      $("g-btn").addEventListener("click", (e) => {
        e.stopPropagation();
        $("settings").classList.toggle("open");
      });
      document.addEventListener("click", (e) => {
        if (!$("g-wrap").contains(e.target))
          $("settings").classList.remove("open");
      });

      document.querySelectorAll(".op-tog").forEach((btn) => {
        btn.addEventListener("click", () => {
          const op = btn.dataset.op;
          if (G.ops.has(op)) {
            if (G.ops.size > 1) {
              G.ops.delete(op);
              btn.classList.remove("on");
            }
          } else {
            G.ops.add(op);
            btn.classList.add("on");
          }
          nextQ();
        });
      });

      $("rng-min").addEventListener("change", () => {
        const v = parseInt($("rng-min").value, 10);
        if (!isNaN(v) && v >= 0 && v < G.max) {
          G.min = v;
          nextQ();
        }
      });
      $("rng-max").addEventListener("change", () => {
        const v = parseInt($("rng-max").value, 10);
        if (!isNaN(v) && v > G.min) {
          G.max = v;
          nextQ();
        }
      });

      $("banner-close").addEventListener("click", () => {
        $("install-banner").classList.remove("show");
        localStorage.setItem("banner-dismissed", "1");
      });

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }

      const isStandalone =
        window.navigator.standalone === true ||
        window.matchMedia("(display-mode: standalone)").matches;
      const dismissed = localStorage.getItem("banner-dismissed");
      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      if (isIOS && !isStandalone && !dismissed) {
        setTimeout(() => $("install-banner").classList.add("show"), 1500);
      }

      G.timerTick = setInterval(tickTimer, 500);
      nextQ();
    </script>
  </body>
</html>
